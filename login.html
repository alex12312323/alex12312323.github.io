<html><head>
    <title>First Flask App</title>
    <style>
           body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: white;
    background-image: linear-gradient(to bottom, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 1) 85%, rgba(0, 123, 255, 1) 100%);
}

header {
    background-color: #0056b3;
    color: white;
    text-align: center;
    padding: 20px;
}

header h1 {
    color: #fff;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

.menu a {
    text-decoration: none;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
    transition: background-color 0.3s ease, color 0.3s ease;
    background-color: #007bff;
}

.menu a:hover {
    background-color: #0056b3;
    color: white;
}

.registration-container {
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    background-color: white;
    border: 2px solid #007bff;
    border-radius: 10px;
    box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
}

.registration-container form {
    display: flex;
    flex-direction: column;
}

.registration-container p {
    margin: 10px 0;
}

.registration-container input[type="text"],
.registration-container input[type="password"] {
    padding: 10px;
    border: 1px solid #007bff;
    border-radius: 5px;
    width: 100%;
    box-sizing: border-box;
}

.registration-container input[type="submit"] {
    background-color: #0056b3;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    width: 100%;
    box-sizing: border-box;
}

.registration-container input[type="submit"]:hover {
    background-color: #003366; 
}

.registration-container a {
    text-align: center;
    display: block;
    margin-top: 10px;
    color: #003366;
    text-decoration: none;
}
p {
    color: #003366; /* Замените "blue" на нужный вам цвет */
}

.registration-container a:hover {
    text-decoration: underline;
}

footer {
    text-align: center;
    background-color: #0056b3;
    color: white;
    padding: 10px;
    position: relative;
    bottom: 0;
    width: 100%;
}

    </style>

 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Авторизация - Информационная безопасность</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>Авторизация</h1>
            <nav class="menu">

                <a href="магазин.html">Магазин</a>
               <a href="окнафреймы.html">Фреймовое окно</a>
                <a href="калин.html">Шифрование</a>
                <a href="удмур.html">Методы защиты</a>

               
                <a href="oнас.html">О нас</a>
<a href="телефонсправочник.html">Справочник</a>
<a href="register.html">Регистрация</a>
            </nav>
        </header>

        <div class="registration-container">
            <form action="/login" method="POST">
                <p>Email: <input type="text" name="email" required></p>
                <p>Пароль: <input type="password" name="password" required></p>
                <p><input type="submit" value="Войти"></p>
                <p><a href="register.html">Не зарегистрированы?</a></p>
            </form>
        </div>
    </div>


</body>
</html>
