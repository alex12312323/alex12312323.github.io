<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник ВУЗов города</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4; /* Легкий серый фон для контента */
        }

     header {
    background-color: #0056b3;
    color: white;
    text-align: center;
    padding: 20px;
}

        /* Стили для меню */
        .menu {
            display: flex;
            justify-content: space-around;
            background-color: #0056b3; /* Черный цвет */
            color: #fff;
            padding: 10px 0;
        }
.menu a {
    text-decoration: none;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
    transition: background-color 0.3s ease, color 0.3s ease;
    background-color: #007bff;
        }

        .menu a:hover {
            background-color: #0056b3; /* Темно-серый цвет при наведении */
        }
        .search-container {
            text-align: center;
            margin: 20px;
        }

        .results {
            padding: 20px;
            background-color: white; /* Белый фон для результатов */
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Легкая тень */
        }

button {
    padding: 10px;
    font-size: 16px;
    cursor: pointer;
}
input[type="text"] {
    padding: 10px;
    font-size: 16px;
    width: 300px;
    margin-right: 10px;
}
    </style>
</head>
<body>
    <div class="menu">
        <a href="glavnua.html">Главная</a>
        <a href="окнафреймы.html">Фреймовая структура</a>
        <a href="калин.html">Шифрование</a>
        <a href="текстовый редактор.html">Редактор документов</a>
        <a href="телефонсправочник.html">Справочник телефонов</a>
        <a href="oнас.html">О нас</a>


    </div>

    <div class="header">
<center>
        <h1>Справочник ВУЗов города</h1>
        <p>Введите слово для поиска (например, "университет", или конкретнее: "технический", "государственный", "школа").</p>
</center>
    </div>

    <div class="search-container">
        <input type="text" id="universityName" placeholder="Введите слово для поиска" required>
        <button onclick="searchUniversity()">Искать</button>
    </div>

    <div class="results" id="results"></div>

    <script>
        const universities = {
            "Государственный университет": {
                address: "ул. Ленина, 32",
                phone: "+7 (125) 456-438-90",
                faculties: ["Факультет робототехники", "Факультет программирования", "Факультет экономики"]
            },
            "Технический университет": {
                address: "пр. Дегтярева, 15",
                phone: "+7 (123) 987-65-43",
                faculties: ["Факультет инженерии", "Факультет физики", "Факультет электроники"]
            },
            "Школа программирования": {
                address: "ул. Мира, 20",
                phone: "+7 (123) 555-12-34",
                faculties: ["Факультет программирования", "Факультет 3D-технологий"]
            }
        };

        function searchUniversity() {
            const name = document.getElementById("universityName").value.toLowerCase();

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = ""; // Очищаем предыдущие результаты

            // Фильтруем университеты по введенному слову
            const results = Object.keys(universities).filter(key => key.toLowerCase().includes(name));

            if (results.length > 0) {
                resultsDiv.innerHTML = "<h3>Найдены ВУЗы:</h3><ul>";
                results.forEach(key => {
                    const uni = universities[key];
                    resultsDiv.innerHTML += `
                        <li>
                            <strong>${key}</strong><br>
                            <p><strong>Адрес:</strong> ${uni.address}</p>
                            <p><strong>Телефон:</strong> ${uni.phone}</p>
                            <p><strong>Факультеты:</strong> ${uni.faculties.join(", ")}</p>
                        </li>
                    `;
                });
                resultsDiv.innerHTML += "</ul>";
            } else {
                resultsDiv.innerHTML = "<p>ВУЗ не найден. Попробуйте другое слово.</p>";
            }
        }
    </script>
</body>
</html>
